version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: orders-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orders-app
    environment:
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: orders
      WEB_PORT: 8000
      GRPC_PORT: 50051
      GRAPHQL_PORT: 8080
    ports:
      - "8000:8000"   # REST
      - "50051:50051" # gRPC
      - "8080:8080"   # GraphQL
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
